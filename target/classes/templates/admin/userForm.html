<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户表单 - 社区老年助餐预约系统</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-lg p-6 max-w-2xl mx-auto">
            <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center" th:text="${action == 'add' ? '新增用户' : '编辑用户'}"></h1>

            <!-- 消息提示 -->
            <div th:if="${error}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4" role="alert">
                <p th:text="${error}"></p>
            </div>

            <!-- 用户表单 -->
            <form th:action="@{/admin/saveUser}" th:object="${user}" method="post">
                <input type="hidden" name="action" th:value="${action}" />
                <input type="hidden" th:if="${action == 'edit'}" th:field="*{id}" />
                
                <div class="mb-4">
                    <label for="username" class="block text-gray-700 text-sm font-bold mb-2">用户名</label>
                    <input type="text" id="username" th:field="*{username}" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" th:readonly="${action == 'edit'}" required />
                </div>
                
                <div class="mb-4">
                    <label for="name" class="block text-gray-700 text-sm font-bold mb-2">姓名</label>
                    <input type="text" id="name" th:field="*{name}" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required />
                </div>
                
                <div class="mb-4">
                    <label for="phone" class="block text-gray-700 text-sm font-bold mb-2">电话</label>
                    <input type="tel" id="phone" th:field="*{phone}" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required />
                </div>
                
                <div class="mb-4">
                    <label for="address" class="block text-gray-700 text-sm font-bold mb-2">地址</label>
                    <input type="text" id="address" th:field="*{address}" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required />
                </div>
                
                <div class="mb-6">
                    <label for="role" class="block text-gray-700 text-sm font-bold mb-2">角色</label>
                    <select id="role" th:field="*{role}" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        <option value="elder">老人用户</option>
                        <option value="canteen">食堂管理员</option>
                        <option value="admin">系统管理员</option>
                    </select>
                </div>
                
                <div class="flex justify-center space-x-4">
                    <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg transition duration-300">
                        <i class="fa fa-save mr-2"></i>保存
                    </button>
                    <a href="/admin/userManage" class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-6 rounded-lg transition duration-300">
                        <i class="fa fa-arrow-left mr-2"></i>返回
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
