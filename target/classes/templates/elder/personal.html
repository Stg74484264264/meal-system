<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 社区老年助餐预约系统</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        secondary: '#FF8C42',
                        success: '#28A745',
                        danger: '#DC3545',
                        warning: '#FFC107',
                        info: '#17A2B8',
                        light: '#F8F9FA',
                        dark: '#343A40',
                        background: '#F5F7FA'
                    },
                    fontFamily: {
                        sans: ['Arial', 'PingFang SC', 'Microsoft YaHei', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            }
            .btn-hover {
                @apply transition-all duration-300 transform hover:scale-105 hover:shadow-lg;
            }
        }
        
        /* 自定义样式 */
        body {
            background-color: #F5F7FA;
            font-family: Arial, PingFang SC, Microsoft YaHei, sans-serif;
            font-size: 18px;
        }
        
        .card {
            @apply bg-white rounded-xl shadow-lg p-6 mb-6;
        }
        
        .profile-header {
            @apply bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-xl p-8 text-center mb-6;
        }
        
        .avatar {
            @apply w-32 h-32 bg-white rounded-full flex items-center justify-center text-4xl text-blue-500 mx-auto mb-4;
        }
        
        .user-name {
            @apply text-2xl font-bold mb-2;
        }
        
        .user-role {
            @apply text-lg opacity-90;
        }
        
        .info-group {
            @apply mb-6;
        }
        
        .info-item {
            @apply flex items-center py-4 border-b border-gray-200;
        }
        
        .info-icon {
            @apply w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center text-xl text-blue-500 mr-4;
        }
        
        .info-content {
            @apply flex-1;
        }
        
        .info-label {
            @apply text-sm text-gray-500 mb-1;
        }
        
        .info-value {
            @apply text-xl font-semibold text-gray-800;
        }
        
        .btn-primary {
            @apply bg-primary text-white text-xl font-bold py-4 px-8 rounded-lg shadow-md hover:bg-blue-600 transition-all duration-300 transform hover:scale-105;
        }
        
        .btn-outline {
            @apply border-2 border-primary text-primary text-xl font-bold py-4 px-8 rounded-lg shadow-md hover:bg-primary hover:text-white transition-all duration-300;
        }
        
        .section-title {
            @apply text-2xl font-bold text-gray-800 mb-4;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                font-size: 16px;
            }
            
            .avatar {
                @apply w-24 h-24 text-3xl;
            }
            
            .user-name {
                @apply text-xl;
            }
            
            .user-role {
                @apply text-base;
            }
            
            .info-icon {
                @apply w-10 h-10 text-lg;
            }
            
            .info-value {
                @apply text-lg;
            }
            
            .btn-primary, .btn-outline {
                @apply text-lg py-3 px-6;
            }
            
            .section-title {
                @apply text-xl;
            }
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8">
        <!-- 头部信息 -->
        <div class="card mb-8">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="text-center">
                    <h1 class="text-3xl font-bold text-primary mb-2">个人信息</h1>
                    <p class="text-xl text-gray-600">查看您的账户信息</p>
                </div>
                <a href="/elder/index" class="btn-outline mt-4 md:mt-0">
                    <i class="fa fa-arrow-left mr-2"></i>返回首页
                </a>
            </div>
        </div>
        
        <div class="max-w-2xl mx-auto">
            <!-- 个人信息头部 -->
            <div class="profile-header">
                <div class="avatar">
                    <i class="fa fa-user"></i>
                </div>
                <h2 class="user-name" th:text="${user.name}"></h2>
                <p class="user-role">老人用户</p>
            </div>
            
            <!-- 个人详细信息 -->
            <div class="card">
                <h3 class="section-title mb-6">
                    <i class="fa fa-id-card mr-2"></i>基本信息
                </h3>
                
                <div class="info-group">
                    <div class="info-item">
                        <div class="info-icon">
                            <i class="fa fa-user-circle"></i>
                        </div>
                        <div class="info-content">
                            <div class="info-label">用户名</div>
                            <div class="info-value" th:text="${user.username}"></div>
                        </div>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-icon">
                            <i class="fa fa-id-card-o"></i>
                        </div>
                        <div class="info-content">
                            <div class="info-label">真实姓名</div>
                            <div class="info-value" th:text="${user.name}"></div>
                        </div>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-icon">
                            <i class="fa fa-phone"></i>
                        </div>
                        <div class="info-content">
                            <div class="info-label">联系电话</div>
                            <div class="info-value" th:text="${user.phone}"></div>
                        </div>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-icon">
                            <i class="fa fa-home"></i>
                        </div>
                        <div class="info-content">
                            <div class="info-label">家庭地址</div>
                            <div class="info-value" th:text="${user.address}"></div>
                        </div>
                    </div>
                    
                    <div class="info-item">
                        <div class="info-icon">
                            <i class="fa fa-calendar-plus-o"></i>
                        </div>
                        <div class="info-content">
                            <div class="info-label">注册时间</div>
                            <div class="info-value" th:text="${user.createTime}"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 账户安全 -->
            <div class="card">
                <h3 class="section-title mb-6">
                    <i class="fa fa-shield mr-2"></i>账户安全
                </h3>
                
                <div class="info-group">
                    <div class="info-item">
                        <div class="info-icon">
                            <i class="fa fa-lock"></i>
                        </div>
                        <div class="info-content">
                            <div class="info-label">登录密码</div>
                            <div class="info-value">
                                ********
                                <span class="text-sm text-gray-500 ml-2">(初始密码：123456)</span>
                            </div>
                        </div>
                        <button id="changePasswordBtn" class="btn-primary text-sm py-2 px-4 ml-4">
                            <i class="fa fa-edit mr-1"></i>修改密码
                        </button>
                    </div>
                </div>
                
                <!-- 修改密码表单 -->
                <div id="changePasswordForm" class="hidden mt-6 pt-6 border-t border-gray-200">
                    <h4 class="text-xl font-bold text-gray-700 mb-4">修改登录密码</h4>
                    
                    <!-- 错误提示 -->
                    <div th:if="${error}" class="mb-4 p-4 bg-red-100 border border-red-300 rounded-lg text-red-700 text-lg">
                        <i class="fa fa-exclamation-circle mr-2"></i>[[${error}]]
                    </div>
                    
                    <form th:action="@{/elder/changePassword}" method="post" class="space-y-4">
                        <div>
                            <label class="block text-lg font-semibold text-gray-700 mb-2">
                                <i class="fa fa-key mr-2"></i>旧密码
                            </label>
                            <input type="password" name="oldPassword" required 
                                   placeholder="请输入旧密码"
                                   class="w-full text-xl px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-300">
                        </div>
                        
                        <div>
                            <label class="block text-lg font-semibold text-gray-700 mb-2">
                                <i class="fa fa-lock mr-2"></i>新密码
                            </label>
                            <input type="password" name="newPassword" required 
                                   placeholder="请输入新密码（至少6位）"
                                   class="w-full text-xl px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-300">
                        </div>
                        
                        <div>
                            <label class="block text-lg font-semibold text-gray-700 mb-2">
                                <i class="fa fa-check-circle mr-2"></i>确认新密码
                            </label>
                            <input type="password" name="confirmPassword" required 
                                   placeholder="请再次输入新密码"
                                   class="w-full text-xl px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-300">
                        </div>
                        
                        <div class="flex space-x-4 pt-4">
                            <button type="submit" class="btn-primary flex-1">
                                <i class="fa fa-save mr-2"></i>确认修改
                            </button>
                            <button type="button" id="cancelChangePasswordBtn" class="btn-outline flex-1">
                                <i class="fa fa-times mr-2"></i>取消
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- 温馨提示 -->
            <div class="card bg-blue-50">
                <h3 class="section-title text-blue-700 mb-4">
                    <i class="fa fa-info-circle mr-2"></i>温馨提示
                </h3>
                <div class="text-lg text-gray-700 space-y-3">
                    <p>• 请妥善保管您的账号密码</p>
                    <p>• 如需修改个人信息，请联系社区工作人员</p>
                    <p>• 如有任何问题，请拨打社区服务热线</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 添加页面加载动画
            const cards = document.querySelectorAll('.card, .profile-header');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.5s ease';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 100);
            });
            
            // 修改密码按钮事件
            const changePasswordBtn = document.getElementById('changePasswordBtn');
            const changePasswordForm = document.getElementById('changePasswordForm');
            const cancelChangePasswordBtn = document.getElementById('cancelChangePasswordBtn');
            
            if (changePasswordBtn && changePasswordForm) {
                changePasswordBtn.addEventListener('click', function() {
                    changePasswordForm.classList.toggle('hidden');
                });
            }
            
            if (cancelChangePasswordBtn && changePasswordForm) {
                cancelChangePasswordBtn.addEventListener('click', function() {
                    changePasswordForm.classList.add('hidden');
                });
            }
        });
    </script>
</body>
</html>
