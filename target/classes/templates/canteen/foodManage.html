<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜品管理 - 社区老年助餐预约系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        secondary: '#FF8C42',
                        success: '#28A745',
                        danger: '#DC3545',
                        warning: '#FFC107',
                        background: '#F5F7FA'
                    },
                    fontFamily: {
                        sans: ['Arial', 'PingFang SC', 'Microsoft YaHei', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        body {
            background-color: #F5F7FA;
            font-family: Arial, PingFang SC, Microsoft YaHei, sans-serif;
            font-size: 15px;
            line-height: 1.6;
        }
        
        .card {
            @apply bg-white rounded-xl shadow-lg p-4 md:p-6 mb-4;
        }
        
        .btn-primary {
            @apply bg-primary text-white font-semibold py-2.5 px-5 rounded-lg shadow-md hover:bg-blue-600 transition-all duration-300;
        }
        
        .btn-outline {
            @apply border-2 border-primary text-primary font-semibold py-2.5 px-5 rounded-lg shadow-md hover:bg-primary hover:text-white transition-all duration-300;
        }
        
        .btn-success {
            @apply bg-success text-white font-semibold py-2.5 px-5 rounded-lg shadow-md hover:bg-green-600 transition-all duration-300;
        }
        
        .btn-danger {
            @apply bg-danger text-white font-semibold py-2.5 px-5 rounded-lg shadow-md hover:bg-red-600 transition-all duration-300;
        }
        
        .food-card {
            @apply bg-white rounded-xl shadow-md overflow-hidden border border-gray-100 hover:shadow-lg transition-all duration-300;
        }
        
        .status-badge {
            @apply inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium;
        }
        
        .status-available {
            @apply bg-green-100 text-green-700;
        }
        
        .status-unavailable {
            @apply bg-red-100 text-red-700;
        }
        
        .meal-type-badge {
            @apply inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-600;
        }
        
        .action-btn {
            @apply flex items-center justify-center px-3 py-2 rounded-lg text-sm font-medium transition-all duration-200;
        }
        
        .edit-btn {
            @apply text-blue-500 hover:text-blue-700 hover:bg-blue-100;
        }
        
        .status-btn {
            @apply text-amber-500 hover:text-amber-700 hover:bg-amber-100;
        }
        
        .delete-btn {
            @apply text-red-500 hover:text-red-700 hover:bg-red-100;
        }
        
        @media (min-width: 1024px) {
            body {
                font-size: 16px;
            }
            
            .btn-primary, .btn-outline, .btn-success, .btn-danger {
                @apply py-3 px-6;
            }
            
            .status-badge {
                @apply px-3 py-1.5 text-sm;
            }
            
            .meal-type-badge {
                @apply px-2.5 py-1 text-sm;
            }
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-6">
        <div class="card">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-primary">菜品管理</h1>
                    <p class="text-gray-600 mt-1">管理菜品的上架和下架</p>
                </div>
                <a href="/canteen/index" class="btn-outline w-full md:w-auto text-center">
                    <i class="fa fa-arrow-left mr-1.5"></i>返回首页
                </a>
            </div>
        </div>
        
        <div th:if="${success != null}" class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-4" role="alert">
            <p th:text="${success}"></p>
        </div>
        
        <div th:if="${error != null}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4" role="alert">
            <p th:text="${error}"></p>
        </div>
        
        
        
        <div class="card">
            <h2 class="text-xl font-bold text-gray-800 mb-4">
                <i class="fa fa-cutlery mr-2"></i>菜品列表
            </h2>
            
            <div th:if="${foods.isEmpty()}" class="text-center py-12">
                <div class="text-gray-400 mb-4">
                    <i class="fa fa-cutlery text-5xl"></i>
                </div>
                <p class="text-gray-500 text-lg">暂无菜品</p>
                <a href="/admin/addFood" class="btn-primary mt-4 inline-block">
                    <i class="fa fa-plus mr-1.5"></i>添加第一个菜品
                </a>
            </div>
            
            <div th:unless="${foods.isEmpty()}" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-5">
                <div th:each="food : ${foods}" class="food-card">
                    <div class="relative">
                        <img th:src="@{/static/images/{image}(image=${food.image})}" th:alt="${food.name}" class="w-full h-40 object-cover" />
                        <span class="absolute top-2 right-2 status-badge" th:classappend="${food.status == 'available' ? 'status-available' : 'status-unavailable'}">
                            <span th:if="${food.status == 'available'}">可预约</span>
                            <span th:if="${food.status == 'unavailable'}">已售罄</span>
                        </span>
                    </div>
                    <div class="p-4">
                        <h3 class="text-lg font-semibold text-gray-800 mb-2" th:text="${food.name}"></h3>
                        <p class="text-gray-600 text-sm mb-3 line-clamp-2" th:text="${food.description}"></p>
                        
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-primary font-semibold" th:text="'¥' + ${food.price}"></span>
                            <span class="text-gray-500 text-sm" th:text="'库存: ' + ${food.stock}"></span>
                        </div>
                        
                        <div class="flex flex-wrap gap-2 mb-4">
                            <span class="meal-type-badge" th:text="${food.category}"></span>
                            <span class="meal-type-badge" th:classappend="${food.mealType == 'breakfast' ? 'bg-orange-100 text-orange-700' : food.mealType == 'lunch' ? 'bg-blue-100 text-blue-700' : food.mealType == 'dinner' ? 'bg-purple-100 text-purple-700' : ''}">
                                <span th:if="${food.mealType == 'breakfast'}">早餐</span>
                                <span th:if="${food.mealType == 'lunch'}">午餐</span>
                                <span th:if="${food.mealType == 'dinner'}">晚餐</span>
                                <span th:if="${food.mealType == null or food.mealType == ''}">未设置</span>
                            </span>
                        </div>
                        
                        <div class="flex justify-center pt-3 border-t border-gray-100">
                            <form th:action="@{/canteen/updateFoodStatus}" th:object="${food}" method="post" class="inline">
                                <input type="hidden" name="foodId" th:value="${food.id}" />
                                <input type="hidden" name="status" th:value="${food.status == 'available' ? 'unavailable' : 'available'}" />
                                <button type="submit" class="btn-primary" title="${food.status == 'available' ? '下架' : '上架'}">
                                    <i class="fa fa-refresh mr-1.5"></i>
                                    <span th:if="${food.status == 'available'}">下架</span>
                                    <span th:if="${food.status != 'available'}">上架</span>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
