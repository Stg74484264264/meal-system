<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>菜品核对 - 社区老年助餐预约系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        secondary: '#FF8C42',
                        success: '#28A745',
                        danger: '#DC3545',
                        warning: '#FFC107',
                        background: '#F5F7FA'
                    },
                    fontFamily: {
                        sans: ['Arial', 'PingFang SC', 'Microsoft YaHei', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        body {
            background-color: #F5F7FA;
            font-family: Arial, PingFang SC, Microsoft YaHei, sans-serif;
            font-size: 15px;
            line-height: 1.6;
        }
        
        .card {
            @apply bg-white rounded-xl shadow-lg p-4 md:p-6 mb-4;
        }
        
        .btn-primary {
            @apply bg-primary text-white font-semibold py-2.5 px-5 rounded-lg shadow-md hover:bg-blue-600 transition-all duration-300;
        }
        
        .btn-outline {
            @apply border-2 border-primary text-primary font-semibold py-2.5 px-5 rounded-lg shadow-md hover:bg-primary hover:text-white transition-all duration-300;
        }
        
        .btn-success {
            @apply bg-success text-white font-semibold py-2.5 px-5 rounded-lg shadow-md hover:bg-green-600 transition-all duration-300;
        }
        
        .form-input {
            @apply w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none;
        }
        
        .food-card {
            @apply bg-white rounded-xl shadow-md p-4 mb-4 border border-gray-100 hover:shadow-lg transition-shadow duration-300;
        }
        
        .food-image {
            @apply w-24 h-24 object-cover rounded-lg;
        }
        
        .quantity-badge {
            @apply inline-flex items-center justify-center w-10 h-10 rounded-full text-lg font-bold;
        }
        
        .quantity-high {
            @apply bg-green-100 text-green-700;
        }
        
        .quantity-medium {
            @apply bg-amber-100 text-amber-700;
        }
        
        .quantity-low {
            @apply bg-red-100 text-red-700;
        }
        
        .meal-type-badge {
            @apply inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium;
        }
        
        .meal-breakfast {
            @apply bg-orange-100 text-orange-700;
        }
        
        .meal-lunch {
            @apply bg-blue-100 text-blue-700;
        }
        
        .meal-dinner {
            @apply bg-purple-100 text-purple-700;
        }
        
        .stat-card {
            @apply bg-gradient-to-r from-primary to-blue-500 rounded-xl shadow-lg p-4 md:p-6 text-white;
        }
        
        .stat-number {
            @apply text-3xl md:text-4xl font-bold mb-1 text-center;
        }
        
        .stat-label {
            @apply text-blue-100;
        }
        
        .desktop-view {
            @apply hidden lg:block;
        }
        
        .mobile-view {
            @apply lg:hidden;
        }
        
        @media (min-width: 1024px) {
            body {
                font-size: 16px;
            }
            
            .btn-primary, .btn-outline, .btn-success {
                @apply py-3 px-6;
            }
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-6">
        <div class="card">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-primary">菜品核对</h1>
                    <p class="text-gray-600 mt-1">核对当日菜品预约数量</p>
                </div>
                <a href="/canteen/index" class="btn-outline w-full md:w-auto text-center">
                    <i class="fa fa-arrow-left mr-1.5"></i>返回首页
                </a>
            </div>
        </div>
        
        <div th:if="${success != null}" class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-4" role="alert">
            <p th:text="${success}"></p>
        </div>
        
        <div th:if="${error != null}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4" role="alert">
            <p th:text="${error}"></p>
        </div>
        
        <div class="card">
            <form th:action="@{/canteen/foodCheck}" method="get" class="flex flex-col sm:flex-row gap-3">
                <input type="date" name="date" th:value="${date}" class="form-input" required>
                <button type="submit" class="btn-primary whitespace-nowrap">
                    <i class="fa fa-search mr-1.5"></i>查询
                </button>
            </form>
        </div>
        
        <div class="stat-card">
            <div class="flex flex-col sm:flex-row justify-between items-center">
                <div>
                    <div class="stat-number" th:text="${totalQuantity}"></div>
                    <div class="stat-label">当日预约总份数</div>
                </div>
                <div class="text-6xl opacity-20">
                    <i class="fa fa-cutlery"></i>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2 class="text-xl font-bold text-gray-800 mb-4">
                <i class="fa fa-list-ul mr-2"></i>
                <span th:text="'菜品预约统计 (' + ${date} + ')'"></span>
            </h2>
            
            <div th:if="${allFoods.isEmpty()}" class="text-center py-12">
                <div class="text-gray-400 mb-4">
                    <i class="fa fa-cutlery text-5xl"></i>
                </div>
                <p class="text-gray-500 text-lg">暂无菜品</p>
            </div>
            
            <div th:unless="${allFoods.isEmpty()}" class="mobile-view">
                <div th:each="food : ${allFoods}" class="food-card">
                    <div class="flex gap-4">
                        <img th:src="@{/static/images/{image}(image=${food.image})}" th:alt="${food.name}" class="food-image">
                        <div class="flex-1">
                            <div class="flex items-start justify-between mb-2">
                                <h3 class="font-semibold text-lg text-gray-800" th:text="${food.name}"></h3>
                                <span class="meal-type-badge" th:classappend="${food.mealType == 'breakfast' ? 'meal-breakfast' : food.mealType == 'lunch' ? 'meal-lunch' : 'meal-dinner'}">
                                    <span th:if="${food.mealType == 'breakfast'}">早餐</span>
                                    <span th:if="${food.mealType == 'lunch'}">午餐</span>
                                    <span th:if="${food.mealType == 'dinner'}">晚餐</span>
                                </span>
                            </div>
                            
                            <div class="text-gray-600 text-sm mb-3" th:text="${food.description}"></div>
                            
                            <div class="flex items-center gap-4">
                                <div>
                                    <div class="text-xs text-gray-400">库存</div>
                                    <div class="font-semibold" th:text="${food.stock}"></div>
                                </div>
                                <div>
                                    <div class="text-xs text-gray-400">预约数</div>
                                    <div class="font-semibold text-primary" th:text="${foodStatistics.get(food.id) != null ? foodStatistics.get(food.id) : 0}"></div>
                                </div>
                                <div>
                                    <div class="text-xs text-gray-400">单价</div>
                                    <div class="font-semibold" th:text="'¥' + ${food.price}"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div th:unless="${allFoods.isEmpty()}" class="desktop-view overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="bg-gradient-to-r from-primary/10 to-primary/5">
                            <th class="py-3 px-4 text-left font-semibold text-gray-700">菜品信息</th>
                            <th class="py-3 px-4 text-center font-semibold text-gray-700">餐型</th>
                            <th class="py-3 px-4 text-center font-semibold text-gray-700">单价</th>
                            <th class="py-3 px-4 text-center font-semibold text-gray-700">库存</th>
                            <th class="py-3 px-4 text-center font-semibold text-gray-700">预约数量</th>
                            <th class="py-3 px-4 text-center font-semibold text-gray-700">金额</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="food : ${allFoods}" class="border-b border-gray-100 hover:bg-blue-50/50 transition-colors">
                            <td class="py-3 px-4">
                                <div class="flex items-center gap-3">
                                    <img th:src="@{/static/images/{image}(image=${food.image})}" th:alt="${food.name}" class="w-14 h-14 object-cover rounded-lg">
                                    <div>
                                        <div class="font-semibold text-gray-800" th:text="${food.name}"></div>
                                        <div class="text-sm text-gray-500" th:text="${food.description}"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="py-3 px-4 text-center">
                                <span class="meal-type-badge" th:classappend="${food.mealType == 'breakfast' ? 'meal-breakfast' : food.mealType == 'lunch' ? 'meal-lunch' : 'meal-dinner'}">
                                    <span th:if="${food.mealType == 'breakfast'}">早餐</span>
                                    <span th:if="${food.mealType == 'lunch'}">午餐</span>
                                    <span th:if="${food.mealType == 'dinner'}">晚餐</span>
                                </span>
                            </td>
                            <td class="py-3 px-4 text-center font-semibold" th:text="'¥' + ${food.price}"></td>
                            <td class="py-3 px-4 text-center" th:text="${food.stock}"></td>
                            <td class="py-3 px-4 text-center">
                                <span class="quantity-badge" th:classappend="${foodStatistics.get(food.id) != null && foodStatistics.get(food.id) > 10 ? 'quantity-high' : foodStatistics.get(food.id) != null && foodStatistics.get(food.id) > 0 ? 'quantity-medium' : 'quantity-low'}"
                                      th:text="${foodStatistics.get(food.id) != null ? foodStatistics.get(food.id) : 0}">
                                </span>
                            </td>
                            <td class="py-3 px-4 text-center font-semibold text-primary" th:text="'¥' + ${food.price * (foodStatistics.get(food.id) != null ? foodStatistics.get(food.id) : 0)}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="card">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 p-4 bg-gray-50 rounded-lg">
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2">
                        <span class="quantity-badge quantity-high">10+</span>
                        <span class="text-sm text-gray-600">高预约量</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="quantity-badge quantity-medium">1-9</span>
                        <span class="text-sm text-gray-600">中预约量</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="quantity-badge quantity-low">0</span>
                        <span class="text-sm text-gray-600">无预约</span>
                    </div>
                </div>
                <button onclick="window.print()" class="btn-success">
                    <i class="fa fa-print mr-1.5"></i>打印清单
                </button>
            </div>
        </div>
    </div>
</body>
</html>
