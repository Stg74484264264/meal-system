<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 - 社区老年助餐预约系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        secondary: '#FF8C42',
                        success: '#28A745',
                        danger: '#DC3545',
                        warning: '#FFC107',
                        background: '#F5F7FA'
                    },
                    fontFamily: {
                        sans: ['Arial', 'PingFang SC', 'Microsoft YaHei', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        body {
            background-color: #F5F7FA;
            font-family: Arial, PingFang SC, Microsoft YaHei, sans-serif;
            font-size: 15px;
            line-height: 1.6;
        }
        
        .card {
            @apply bg-white rounded-xl shadow-lg p-4 md:p-6 mb-4;
        }
        
        .btn-primary {
            @apply bg-primary text-white font-semibold py-2.5 px-5 rounded-lg shadow-md hover:bg-blue-600 transition-all duration-300;
        }
        
        .btn-secondary {
            @apply bg-secondary text-white font-semibold py-2.5 px-5 rounded-lg shadow-md hover:bg-orange-500 transition-all duration-300;
        }
        
        .btn-success {
            @apply bg-success text-white font-semibold py-2.5 px-5 rounded-lg shadow-md hover:bg-green-600 transition-all duration-300;
        }
        
        .btn-danger {
            @apply bg-danger text-white font-semibold py-2.5 px-5 rounded-lg shadow-md hover:bg-red-600 transition-all duration-300;
        }
        
        .btn-outline {
            @apply border-2 border-primary text-primary font-semibold py-2.5 px-5 rounded-lg shadow-md hover:bg-primary hover:text-white transition-all duration-300;
        }
        
        .btn-sm {
            @apply py-2 px-4 text-sm;
        }
        
        .form-input {
            @apply w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none;
        }
        
        .form-select {
            @apply w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none;
        }
        
        .status-badge {
            @apply inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium;
        }
        
        .status-pending {
            @apply bg-amber-100 text-amber-700;
        }
        
        .status-confirmed {
            @apply bg-blue-100 text-blue-700;
        }
        
        .status-completed {
            @apply bg-green-100 text-green-700;
        }
        
        .status-cancelled {
            @apply bg-red-100 text-red-700;
        }
        
        .order-card {
            @apply bg-white rounded-lg shadow-md p-4 mb-3 border border-gray-100 hover:shadow-lg transition-shadow duration-300;
        }
        
        .food-image {
            @apply w-14 h-14 object-cover rounded-lg;
        }
        
        .desktop-table {
            @apply hidden lg:table w-full;
        }
        
        .mobile-view {
            @apply lg:hidden;
        }
        
        @media (min-width: 1024px) {
            body {
                font-size: 16px;
            }
            
            .btn-primary, .btn-secondary, .btn-success, .btn-danger, .btn-outline {
                @apply py-3 px-6;
            }
            
            .status-badge {
                @apply px-3 py-1.5 text-sm;
            }
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-6">
        <div class="card">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold text-primary">订单管理</h1>
                    <p class="text-gray-600 mt-1">查看和处理预约订单</p>
                </div>
                <a href="/canteen/index" class="btn-outline w-full md:w-auto text-center">
                    <i class="fa fa-arrow-left mr-1.5"></i>返回首页
                </a>
            </div>
        </div>
        
        <div th:if="${success != null}" class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-4" role="alert">
            <p th:text="${success}"></p>
        </div>
        
        <div th:if="${error != null}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4" role="alert">
            <p th:text="${error}"></p>
        </div>
        
        <div class="card">
            <div class="flex flex-col lg:flex-row gap-4 mb-4">
                <div class="flex-1">
                    <form th:action="@{/canteen/orderList}" method="get" class="flex gap-2">
                        <input type="date" name="date" th:value="${date}" class="form-input flex-1" required>
                        <button type="submit" class="btn-primary whitespace-nowrap">
                            <i class="fa fa-search mr-1.5"></i>查询
                        </button>
                    </form>
                </div>
                
                <div class="flex-1">
                    <form th:action="@{/canteen/orderList}" method="get" class="flex gap-2">
                        <input type="hidden" name="date" th:value="${date}">
                        <select name="status" th:value="${status}" class="form-select flex-1">
                            <option value="">全部状态</option>
                            <option value="pending">待配餐</option>
                            <option value="confirmed">已配餐</option>
                            <option value="completed">已领取</option>
                        </select>
                        <button type="submit" class="btn-secondary whitespace-nowrap">
                            <i class="fa fa-filter mr-1.5"></i>筛选
                        </button>
                    </form>
                </div>
            </div>
            
            <form th:action="@{/canteen/batchUpdateOrderStatus}" method="post" id="batchForm">
                <input type="hidden" name="date" th:value="${date}">
                <input type="hidden" name="status" th:value="${status}">
                <div class="flex flex-wrap gap-3 items-center">
                    <div class="flex items-center">
                        <input type="checkbox" id="selectAll" class="w-5 h-5 text-blue-600">
                        <label for="selectAll" class="ml-2 font-semibold">全选</label>
                    </div>
                    
                    <div class="flex gap-2">
                        <button type="submit" name="status" value="confirmed" class="btn-success btn-sm" onclick="return confirmBatchOperation('确认将选中订单标记为已配餐吗？')">
                            <i class="fa fa-check mr-1"></i>批量配餐
                        </button>
                        <button type="submit" name="status" value="completed" class="btn-primary btn-sm" onclick="return confirmBatchOperation('确认将选中订单标记为已领取吗？')">
                            <i class="fa fa-check-circle mr-1"></i>批量确认领取
                        </button>
                    </div>
                </div>
            </form>
        </div>
        
        <div class="card">
            <h2 class="text-xl font-bold text-gray-800 mb-4">
                <i class="fa fa-list-ul mr-2"></i>
                <span th:text="'订单列表 (' + ${date} + ')'"></span>
            </h2>
            
            <div th:if="${orders.isEmpty()}" class="text-center py-12">
                <div class="text-gray-400 mb-4">
                    <i class="fa fa-shopping-cart text-5xl"></i>
                </div>
                <p class="text-gray-500 text-lg">暂无订单</p>
            </div>
            
            <div th:unless="${orders.isEmpty()}" class="mobile-view">
                <div th:each="order : ${orders}" class="order-card">
                    <div class="flex gap-3">
                        <input type="checkbox" name="orderIds" th:value="${order.id}" class="order-checkbox w-5 h-5 text-blue-600 mt-1" form="batchForm">
                        <div class="flex-1">
                            <div class="flex items-start justify-between mb-2">
                                <span class="font-mono text-sm text-gray-500" th:text="${order.id.substring(0, 16)} + '...'"></span>
                                <span class="status-badge" th:classappend="${order.status == 'pending' ? 'status-pending' : order.status == 'confirmed' ? 'status-confirmed' : order.status == 'completed' ? 'status-completed' : 'status-cancelled'}"
                                      th:text="${order.status == 'pending' ? '待配餐' : order.status == 'confirmed' ? '已配餐' : order.status == 'completed' ? '已领取' : '已取消'}">
                                </span>
                            </div>
                            <div class="flex items-center gap-3 mb-2">
                                <img th:src="@{/static/images/{image}(image=${order.foodImage})}" th:alt="${order.foodName}" class="food-image">
                                <div>
                                    <div class="font-semibold" th:text="${order.foodName}"></div>
                                    <div class="text-sm text-gray-500" th:text="${order.quantity} + ' 份'"></div>
                                </div>
                            </div>
                            <div class="text-sm text-gray-500 mb-1" th:text="'用户: ' + ${order.userName}"></div>
                            <div class="text-xs text-gray-400 mb-3" th:text="'下单时间: ' + ${order.createTime}"></div>
                            <form th:action="@{/canteen/updateOrderStatus}" method="post" class="flex gap-2">
                                <input type="hidden" name="orderId" th:value="${order.id}">
                                <input type="hidden" name="date" th:value="${date}">
                                <input type="hidden" name="status" th:value="${status}">
                                <button type="submit" name="newStatus" value="confirmed" class="btn-success btn-sm flex-1" 
                                        th:if="${order.status == 'pending'}" 
                                        onclick="return confirm('确认将此订单标记为已配餐吗？')">
                                    <i class="fa fa-check mr-1"></i>配餐
                                </button>
                                <button type="submit" name="newStatus" value="completed" class="btn-primary btn-sm flex-1" 
                                        th:if="${order.status == 'confirmed'}" 
                                        onclick="return confirm('确认将此订单标记为已领取吗？')">
                                    <i class="fa fa-check-circle mr-1"></i>确认领取
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            
            <div th:unless="${orders.isEmpty()}" class="overflow-x-auto lg:overflow-visible">
                <table class="desktop-table">
                    <thead>
                        <tr class="bg-gradient-to-r from-primary/10 to-primary/5">
                            <th class="py-3 px-4 text-left font-semibold text-gray-700 w-12">
                                <input type="checkbox" id="headerSelectAll" class="w-5 h-5 text-blue-600">
                            </th>
                            <th class="py-3 px-4 text-left font-semibold text-gray-700">订单编号</th>
                            <th class="py-3 px-4 text-left font-semibold text-gray-700">用户信息</th>
                            <th class="py-3 px-4 text-left font-semibold text-gray-700">餐食信息</th>
                            <th class="py-3 px-4 text-center font-semibold text-gray-700">数量</th>
                            <th class="py-3 px-4 text-left font-semibold text-gray-700">下单时间</th>
                            <th class="py-3 px-4 text-center font-semibold text-gray-700">状态</th>
                            <th class="py-3 px-4 text-center font-semibold text-gray-700">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}" class="border-b border-gray-100 hover:bg-blue-50/50 transition-colors">
                            <td class="py-3 px-4">
                                <input type="checkbox" name="orderIds" th:value="${order.id}" class="order-checkbox w-5 h-5 text-blue-600" form="batchForm">
                            </td>
                            <td class="py-3 px-4 font-mono text-sm" th:text="${order.id}"></td>
                            <td class="py-3 px-4">
                                <div class="font-semibold" th:text="${order.userName}"></div>
                                <div class="text-sm text-gray-500" th:text="'用户ID: ' + ${order.userId.substring(0, 12)} + '...'"></div>
                            </td>
                            <td class="py-3 px-4">
                                <div class="flex items-center gap-3">
                                    <img th:src="@{/static/images/{image}(image=${order.foodImage})}" th:alt="${order.foodName}" class="w-12 h-12 object-cover rounded-lg">
                                    <div>
                                        <div class="font-semibold" th:text="${order.foodName}"></div>
                                        <div class="text-sm text-gray-500" th:text="'餐食ID: ' + ${order.foodId}"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="py-3 px-4 text-center font-semibold text-primary" th:text="${order.quantity} + ' 份'"></td>
                            <td class="py-3 px-4 text-gray-600 text-sm" th:text="${order.createTime}"></td>
                            <td class="py-3 px-4 text-center">
                                <span class="status-badge" th:classappend="${order.status == 'pending' ? 'status-pending' : order.status == 'confirmed' ? 'status-confirmed' : order.status == 'completed' ? 'status-completed' : 'status-cancelled'}"
                                      th:text="${order.status == 'pending' ? '待配餐' : order.status == 'confirmed' ? '已配餐' : order.status == 'completed' ? '已领取' : '已取消'}">
                                </span>
                            </td>
                            <td class="py-3 px-4">
                                <form th:action="@{/canteen/updateOrderStatus}" method="post" class="flex justify-center gap-2">
                                    <input type="hidden" name="orderId" th:value="${order.id}">
                                    <input type="hidden" name="date" th:value="${date}">
                                    <input type="hidden" name="status" th:value="${status}">
                                    <button type="submit" name="newStatus" value="confirmed" class="btn-success btn-sm" 
                                            th:if="${order.status == 'pending'}" 
                                            onclick="return confirm('确认将此订单标记为已配餐吗？')">
                                        <i class="fa fa-check mr-1"></i>配餐
                                    </button>
                                    <button type="submit" name="newStatus" value="completed" class="btn-primary btn-sm" 
                                            th:if="${order.status == 'confirmed'}" 
                                            onclick="return confirm('确认将此订单标记为已领取吗？')">
                                        <i class="fa fa-check-circle mr-1"></i>确认领取
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const selectAllCheckbox = document.getElementById('selectAll');
            const headerSelectAllCheckbox = document.getElementById('headerSelectAll');
            const orderCheckboxes = document.querySelectorAll('.order-checkbox');
            
            function updateSelectAllState() {
                const checkedCount = document.querySelectorAll('.order-checkbox:checked').length;
                selectAllCheckbox.checked = checkedCount === orderCheckboxes.length && orderCheckboxes.length > 0;
                if (headerSelectAllCheckbox) {
                    headerSelectAllCheckbox.checked = selectAllCheckbox.checked;
                }
            }
            
            selectAllCheckbox.addEventListener('change', function() {
                orderCheckboxes.forEach(checkbox => {
                    checkbox.checked = this.checked;
                });
            });
            
            if (headerSelectAllCheckbox) {
                headerSelectAllCheckbox.addEventListener('change', function() {
                    orderCheckboxes.forEach(checkbox => {
                        checkbox.checked = this.checked;
                    });
                    selectAllCheckbox.checked = this.checked;
                });
            }
            
            orderCheckboxes.forEach(checkbox => {
                checkbox.addEventListener('change', updateSelectAllState);
            });
            
            updateSelectAllState();
        });
        
        function confirmBatchOperation(message) {
            const checkedCount = document.querySelectorAll('.order-checkbox:checked').length;
            if (checkedCount === 0) {
                alert('请选择要操作的订单');
                return false;
            }
            return confirm(message);
        }
    </script>
</body>
</html>
