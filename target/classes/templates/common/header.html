<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公共头部 - 社区老年助餐预约系统</title>
</head>
<body>
    <!-- 公共头部导航栏 -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <!-- Logo -->
                <div class="flex items-center">
                    <img th:src="@{/images/logo.jpg}" alt="系统Logo" class="h-12 mr-3">
                    <span class="text-2xl font-bold text-blue-600">社区老年助餐</span>
                </div>
                
                <!-- 桌面端导航 -->
                <div class="hidden md:flex space-x-6">
                    <a th:href="@{/elder/index}" class="text-xl font-semibold px-4 py-3 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors duration-300" th:classappend="${activePage == 'home' ? 'bg-blue-50 text-blue-600' : ''}">
                        <i class="fa fa-home mr-2"></i>首页
                    </a>
                    <a th:href="@{/elder/menu}" class="text-xl font-semibold px-4 py-3 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors duration-300" th:classappend="${activePage == 'menu' ? 'bg-blue-50 text-blue-600' : ''}">
                        <i class="fa fa-cutlery mr-2"></i>菜单
                    </a>
                    <a th:href="@{/elder/orders}" class="text-xl font-semibold px-4 py-3 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors duration-300" th:classappend="${activePage == 'orders' ? 'bg-blue-50 text-blue-600' : ''}">
                        <i class="fa fa-shopping-cart mr-2"></i>我的订单
                    </a>
                    <a th:href="@{/elder/personal}" class="text-xl font-semibold px-4 py-3 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors duration-300" th:classappend="${activePage == 'personal' ? 'bg-blue-50 text-blue-600' : ''}">
                        <i class="fa fa-user mr-2"></i>个人信息
                    </a>
                    <a th:href="@{/login/logout}" class="text-xl font-semibold px-4 py-3 hover:bg-red-50 hover:text-red-600 rounded-lg transition-colors duration-300">
                        <i class="fa fa-sign-out mr-2"></i>退出登录
                    </a>
                </div>
                
                <!-- 手机端下拉菜单按钮 -->
                <div class="md:hidden">
                    <button type="button" id="mobile-menu-button" class="text-xl font-semibold px-4 py-3 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors duration-300 focus:outline-none">
                        <i class="fa fa-bars mr-2"></i>菜单
                    </button>
                </div>
            </div>
            
            <!-- 手机端下拉菜单 -->
            <div id="mobile-menu" class="md:hidden hidden mt-4 bg-white rounded-lg shadow-lg">
                <div class="flex flex-col space-y-2">
                    <a th:href="@{/elder/index}" class="text-xl font-semibold px-6 py-4 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors duration-300" th:classappend="${activePage == 'home' ? 'bg-blue-50 text-blue-600' : ''}">
                        <i class="fa fa-home mr-2"></i>首页
                    </a>
                    <a th:href="@{/elder/menu}" class="text-xl font-semibold px-6 py-4 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors duration-300" th:classappend="${activePage == 'menu' ? 'bg-blue-50 text-blue-600' : ''}">
                        <i class="fa fa-cutlery mr-2"></i>菜单
                    </a>
                    <a th:href="@{/elder/orders}" class="text-xl font-semibold px-6 py-4 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors duration-300" th:classappend="${activePage == 'orders' ? 'bg-blue-50 text-blue-600' : ''}">
                        <i class="fa fa-shopping-cart mr-2"></i>我的订单
                    </a>
                    <a th:href="@{/elder/personal}" class="text-xl font-semibold px-6 py-4 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition-colors duration-300" th:classappend="${activePage == 'personal' ? 'bg-blue-50 text-blue-600' : ''}">
                        <i class="fa fa-user mr-2"></i>个人信息
                    </a>
                    <a th:href="@{/login/logout}" class="text-xl font-semibold px-6 py-4 hover:bg-red-50 hover:text-red-600 rounded-lg transition-colors duration-300">
                        <i class="fa fa-sign-out mr-2"></i>退出登录
                    </a>
                </div>
            </div>
        </nav>
    </header>
    
    <script>
        // 手机端菜单切换
        document.addEventListener('DOMContentLoaded', function() {
            const mobileMenuButton = document.getElementById('mobile-menu-button');
            const mobileMenu = document.getElementById('mobile-menu');
            
            if (mobileMenuButton && mobileMenu) {
                mobileMenuButton.addEventListener('click', function() {
                    mobileMenu.classList.toggle('hidden');
                });
                
                // 点击菜单项后关闭菜单
                const mobileMenuItems = mobileMenu.querySelectorAll('a');
                mobileMenuItems.forEach(item => {
                    item.addEventListener('click', function() {
                        mobileMenu.classList.add('hidden');
                    });
                });
            }
        });
    </script>
</body>
</html>
