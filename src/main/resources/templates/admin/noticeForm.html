<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告表单 - 社区老年助餐预约系统</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-lg p-6 max-w-2xl mx-auto">
            <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">发布公告</h1>

            <!-- 消息提示 -->
            <div th:if="${error}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4" role="alert">
                <p th:text="${error}"></p>
            </div>

            <!-- 公告表单 -->
            <form th:action="@{/admin/saveNotice}" th:object="${notice}" method="post">
                <div class="mb-4">
                    <label for="title" class="block text-gray-700 text-sm font-bold mb-2">公告标题</label>
                    <input type="text" id="title" th:field="*{title}" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required />
                </div>
                
                <div class="mb-4">
                    <label for="content" class="block text-gray-700 text-sm font-bold mb-2">公告内容</label>
                    <textarea id="content" th:field="*{content}" rows="6" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required></textarea>
                </div>
                
                
                
                <div class="flex justify-center space-x-4">
                    <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg transition duration-300">
                        <i class="fa fa-paper-plane mr-2"></i>发布
                    </button>
                    <a href="/admin/noticeManage" class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-6 rounded-lg transition duration-300">
                        <i class="fa fa-arrow-left mr-2"></i>返回
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
