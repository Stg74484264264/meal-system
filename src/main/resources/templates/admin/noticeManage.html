<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告管理 - 社区老年助餐预约系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        secondary: '#FF8C42',
                        success: '#28A745',
                        danger: '#DC3545',
                        warning: '#FFC107',
                        info: '#17A2B8',
                        light: '#F8F9FA',
                        dark: '#343A40',
                        background: '#F5F7FA'
                    },
                    fontFamily: {
                        sans: ['Arial', 'PingFang SC', 'Microsoft YaHei', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        body {
            background-color: #F5F7FA;
            font-family: Arial, PingFang SC, Microsoft YaHei, sans-serif;
            font-size: 15px;
            line-height: 1.6;
        }
        
        .card {
            @apply bg-white rounded-xl shadow-lg p-4 md:p-6 mb-4;
        }
        
        .btn-primary {
            @apply bg-primary text-white font-semibold py-2.5 px-5 rounded-lg shadow-md hover:bg-blue-600 transition-all duration-300;
        }
        
        .btn-outline {
            @apply border-2 border-primary text-primary font-semibold py-2.5 px-5 rounded-lg shadow-md hover:bg-primary hover:text-white transition-all duration-300;
        }
        
        .delete-btn {
            @apply flex items-center justify-center w-9 h-9 rounded-lg text-red-500 hover:text-red-700 hover:bg-red-100 transition-all duration-200;
        }
        
        .notice-card {
            @apply bg-white rounded-lg shadow-md p-4 md:p-5 mb-4 border border-gray-100 hover:shadow-lg transition-shadow duration-300;
        }
        
        @media (min-width: 1024px) {
            body {
                font-size: 16px;
            }
            
            .btn-primary, .btn-outline {
                @apply py-3 px-6;
            }
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-6">
        <div class="card">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3 sm:gap-4">
                    <a href="/admin/index" class="btn-outline w-full sm:w-auto text-center">
                        <i class="fa fa-arrow-left mr-1.5"></i>返回首页
                    </a>
                    <h1 class="text-2xl sm:text-3xl font-bold text-primary">公告管理</h1>
                </div>
                <a href="/admin/addNotice" class="btn-primary w-full sm:w-auto text-center">
                    <i class="fa fa-plus mr-1.5"></i>发布公告
                </a>
            </div>

            <div th:if="${success}" class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-4" role="alert">
                <p th:text="${success}"></p>
            </div>
            <div th:if="${error}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4" role="alert">
                <p th:text="${error}"></p>
            </div>

            <div class="space-y-4">
                <div th:each="notice : ${notices}" class="notice-card">
                    <div class="flex flex-col sm:flex-row sm:justify-between gap-3">
                        <div class="flex-1">
                            <h3 class="text-lg md:text-xl font-semibold text-gray-800 mb-3" th:text="${notice.title}"></h3>
                            <p class="text-gray-600 leading-relaxed mb-4" th:text="${notice.content}"></p>
                            <div class="flex items-center text-sm text-gray-500">
                                <i class="fa fa-clock-o mr-2"></i>
                                <span th:text="${notice.createTime}"></span>
                            </div>
                        </div>
                        <div class="flex justify-center sm:justify-end pt-2 sm:pt-0">
                            <form th:action="@{/admin/deleteNotice}" th:object="${notice}" method="post" class="inline">
                                <input type="hidden" name="noticeId" th:value="${notice.id}" />
                                <button type="submit" class="delete-btn" onclick="return confirm('确定要删除该公告吗？')" title="删除公告">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${notices == null or notices.isEmpty()}" class="text-center py-12">
                <div class="text-gray-400 mb-4">
                    <i class="fa fa-file-text-o text-5xl"></i>
                </div>
                <p class="text-gray-500 text-lg">暂无公告</p>
                <a href="/admin/addNotice" class="btn-primary mt-4 inline-block">
                    <i class="fa fa-plus mr-1.5"></i>发布第一条公告
                </a>
            </div>
        </div>
    </div>
</body>
</html>
