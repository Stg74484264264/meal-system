<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 社区老年助餐预约系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        secondary: '#FF8C42',
                        success: '#28A745',
                        danger: '#DC3545',
                        warning: '#FFC107',
                        info: '#17A2B8',
                        light: '#F8F9FA',
                        dark: '#343A40',
                        background: '#F5F7FA'
                    },
                    fontFamily: {
                        sans: ['Arial', 'PingFang SC', 'Microsoft YaHei', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            }
            .btn-hover {
                @apply transition-all duration-300 transform hover:scale-105 hover:shadow-lg;
            }
            .input-focus {
                @apply focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none;
            }
        }
        
        body {
            background-color: #F5F7FA;
            font-family: Arial, PingFang SC, Microsoft YaHei, sans-serif;
        }
        
        .password-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .password-form {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
        }
        
        .form-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .form-subtitle {
            font-size: 16px;
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            font-size: 18px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            height: 52px;
            padding: 0 16px;
            font-size: 18px;
            border: 2px solid #E1E5EB;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            border-color: #4A90E2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
            outline: none;
        }
        
        .submit-btn {
            width: 100%;
            height: 56px;
            background: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%);
            color: white;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }
        
        .submit-btn:hover {
            background: linear-gradient(135deg, #357ABD 0%, #285F8F 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(74, 144, 226, 0.3);
        }
        
        .error-message {
            background-color: #FEE2E2;
            color: #DC2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 24px;
            border: 1px solid #FECACA;
        }
        
        .success-message {
            background-color: #D1FAE5;
            color: #059669;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 24px;
            border: 1px solid #A7F3D0;
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
        }
        
        .system-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .back-link {
            text-align: center;
            margin-top: 24px;
            font-size: 16px;
            color: #666;
        }
        
        .back-link a {
            color: #4A90E2;
            text-decoration: none;
            font-weight: 600;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .password-form {
                padding: 32px 24px;
            }
            
            .form-title {
                font-size: 24px;
            }
            
            .form-input {
                height: 48px;
                font-size: 16px;
            }
            
            .submit-btn {
                height: 52px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="password-container">
        <div class="password-form">
            <div class="logo-container">
                <img th:src="@{/static/images/logo.jpg}" alt="社区老年助餐系统" class="logo">
                <div class="system-name">社区老年助餐预约系统</div>
            </div>
            
            <h1 class="form-title">
                <i class="fa fa-key mr-2"></i>忘记密码
            </h1>
            <p class="form-subtitle">请输入用户名，系统将重置您的密码为默认密码</p>
            
            <div th:if="${error != null}" class="error-message">
                <i class="fa fa-exclamation-circle mr-2"></i>
                <span th:text="${error}"></span>
            </div>
            
            <div th:if="${success != null}" class="success-message">
                <i class="fa fa-check-circle mr-2"></i>
                <span th:text="${success}"></span>
            </div>
            
            <form th:action="@{/login/forgotPassword}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">
                        <i class="fa fa-user-circle mr-2"></i>用户名
                    </label>
                    <input type="text" id="username" name="username" class="form-input" 
                           placeholder="请输入用户名" required autofocus>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fa fa-refresh mr-2"></i>重置密码
                </button>
            </form>
            
            <div class="back-link">
                <a href="/login"><i class="fa fa-arrow-left mr-1"></i>返回登录页面</a>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const usernameInput = document.getElementById('username');
            const submitBtn = document.querySelector('.submit-btn');
            
            if (usernameInput) {
                usernameInput.focus();
            }
            
            usernameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    this.form.submit();
                }
            });
            
            submitBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const form = this.form;
                const requiredFields = form.querySelectorAll('[required]');
                let isValid = true;
                
                requiredFields.forEach(field => {
                    if (!field.value.trim()) {
                        isValid = false;
                        field.style.borderColor = '#DC3545';
                    } else {
                        field.style.borderColor = '#E1E5EB';
                    }
                });
                
                if (isValid) {
                    this.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>处理中...';
                    this.disabled = true;
                    form.submit();
                }
            });
        });
    </script>
</body>
</html>
