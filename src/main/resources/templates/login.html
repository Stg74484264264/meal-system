<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区老年助餐预约系统 - 登录</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A90E2',
                        secondary: '#FF8C42',
                        success: '#28A745',
                        danger: '#DC3545',
                        warning: '#FFC107',
                        info: '#17A2B8',
                        light: '#F8F9FA',
                        dark: '#343A40',
                        background: '#F5F7FA'
                    },
                    fontFamily: {
                        sans: ['Arial', 'PingFang SC', 'Microsoft YaHei', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            }
            .btn-hover {
                @apply transition-all duration-300 transform hover:scale-105 hover:shadow-lg;
            }
            .input-focus {
                @apply focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none;
            }
        }
        
        /* 自定义样式 */
        body {
            background-color: #F5F7FA;
            font-family: Arial, PingFang SC, Microsoft YaHei, sans-serif;
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-form {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
        }
        
        .form-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            font-size: 18px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            height: 52px;
            padding: 0 16px;
            font-size: 18px;
            border: 2px solid #E1E5EB;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            border-color: #4A90E2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
            outline: none;
        }
        
        .login-btn {
            width: 100%;
            height: 56px;
            background: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%);
            color: white;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }
        
        .login-btn:hover {
            background: linear-gradient(135deg, #357ABD 0%, #285F8F 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(74, 144, 226, 0.3);
        }
        
        .error-message {
            background-color: #FEE2E2;
            color: #DC2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 24px;
            border: 1px solid #FECACA;
        }
        
        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
        }
        
        .system-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 14px;
            color: #666;
        }
        
        /* 响应式设计 */
        @media (max-width: 480px) {
            .login-form {
                padding: 32px 24px;
            }
            
            .form-title {
                font-size: 24px;
            }
            
            .form-input {
                height: 48px;
                font-size: 16px;
            }
            
            .login-btn {
                height: 52px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-form">
            <!-- Logo和系统名称 -->
            <div class="logo-container">
                <img th:src="@{/static/images/logo.jpg}" alt="社区老年助餐系统" class="logo">
                <div class="system-name">社区老年助餐预约系统</div>
            </div>
            
            <!-- 错误信息显示 -->
            <div th:if="${error != null}" class="error-message">
                <i class="fa fa-exclamation-circle mr-2"></i>
                <span th:text="${error}"></span>
            </div>
            
            <!-- 未登录提示 -->
            <div th:if="${message != null}" class="bg-blue-50 border border-blue-200 text-blue-700 px-4 py-3 rounded">
                <i class="fa fa-info-circle mr-2"></i>
                <span th:text="${message}"></span>
            </div>
            
            <!-- 登录表单 -->
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">
                        <i class="fa fa-user-circle mr-2"></i>用户名
                    </label>
                    <input type="text" id="username" name="username" class="form-input" 
                           placeholder="请输入用户名" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fa fa-lock mr-2"></i>密码
                    </label>
                    <input type="password" id="password" name="password" class="form-input" 
                           placeholder="请输入密码" required>
                </div>
                
                <button type="submit" class="login-btn">
                    <i class="fa fa-sign-in mr-2"></i>登录
                </button>
            </form>
            
            <!-- 忘记密码链接 -->
            <div class="text-center mt-4">
                <a href="/login/forgotPassword" class="text-primary hover:text-blue-700 font-semibold">
                    <i class="fa fa-question-circle mr-1"></i>忘记密码？
                </a>
            </div>
            

            
            <div class="footer">
                <p>© 2026 社区老年助餐预约系统 版权所有</p>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.querySelector('.login-btn');
            
            if (usernameInput) {
                usernameInput.focus();
            }
            
            usernameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    passwordInput.focus();
                }
            });
            
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    this.form.submit();
                }
            });
            
            loginBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const form = this.form;
                const requiredFields = form.querySelectorAll('[required]');
                let isValid = true;
                
                requiredFields.forEach(field => {
                    if (!field.value.trim()) {
                        isValid = false;
                        field.style.borderColor = '#DC3545';
                    } else {
                        field.style.borderColor = '#E1E5EB';
                    }
                });
                
                if (isValid) {
                    this.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>登录中...';
                    this.disabled = true;
                    form.submit();
                }
            });
        });
    </script>
</body>
</html>
