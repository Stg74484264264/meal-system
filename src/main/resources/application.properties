# 服务器配置
server.port=8081

# Session配置
server.servlet.session.timeout=86400s
server.servlet.session.cookie.max-age=86400s

# Thymeleaf配置
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML5

# 静态资源配置
spring.resources.static-locations=classpath:/static/,classpath:/data/

# 数据源配置 - MySQL数据库
spring.datasource.url=jdbc:mysql://localhost:3306/meal_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# 自定义配置
meal.upload.path=C:/Users/19544/Documents/meal-system/src/main/resources/static/images/
